<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网络拓扑管理工具</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Inject mock API when not running in Electron
      if (!window.api) {
        var s = document.createElement('script');
        s.src = '/src/mock-api.ts';
        s.type = 'module';
        document.head.appendChild(s);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
